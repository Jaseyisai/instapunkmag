[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[[redirects]]
  from = "/api/find-stores"
  to = "/.netlify/functions/find-stores"
  status = 200

[[redirects]]
  from = "/api/generate-article"
  to = "/.netlify/functions/generate-article"
  status = 200

[[redirects]]
  from = "/api/generate-image"
  to = "/.netlify/functions/generate-image"
  status = 200

[[redirects]]
  from = "/api/find-shows"
  to = "/.netlify/functions/find-shows"
  status = 200

[[redirects]]
  from = "/api/generate-music"
  to = "/.netlify/functions/generate-music"
  status = 200
